<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#3d0a5a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Ferme du Rebond">
<title>Ferme du Rebond</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d1a;--win:#120822;--bo:#ff6b9d;--bi:#8b1a4a;--gold:#ff9ecb;--cy:#00e5cc;--pk:#ff3d7f;--gr:#00ffcc;--re:#ff2255;--or:#ff7043;--si:#ffb3c6;--dm:#7a4060;--wh:#ffe8f0;--teal:#00c9b1;--sun:#ff6b5b}
body{background:var(--bg);color:var(--wh);font-family:'Press Start 2P',monospace;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:-2;background:linear-gradient(180deg,#1a0530 0%,#2d0845 30%,#0d1a2e 60%,#051a1a 100%)}
body::after{content:'';position:fixed;bottom:0;left:0;right:0;height:40%;z-index:-1;background:linear-gradient(transparent,rgba(0,200,180,.04)),repeating-linear-gradient(90deg,rgba(0,229,204,.07) 0px,transparent 1px,transparent 50px,rgba(0,229,204,.07) 51px),repeating-linear-gradient(0deg,rgba(0,229,204,.07) 0px,transparent 1px,transparent 35px,rgba(0,229,204,.07) 36px);perspective:200px;transform:rotateX(30deg);transform-origin:bottom}
.w{background:rgba(18,8,34,.92);border:3px solid var(--bo);box-shadow:0 0 12px rgba(255,107,157,.3),inset 0 0 20px rgba(255,61,127,.04);position:relative;padding:16px;backdrop-filter:blur(4px)}
.w::before{content:'◆';font-size:9px;color:var(--bo);position:absolute;top:-2px;left:5px;text-shadow:0 0 6px var(--bo)}
.w::after{content:'◆';font-size:9px;color:var(--bo);position:absolute;top:-2px;right:5px;text-shadow:0 0 6px var(--bo)}
.wbl{position:absolute;bottom:-2px;left:5px;font-size:9px;color:var(--bo);text-shadow:0 0 6px var(--bo)}
.wbr{position:absolute;bottom:-2px;right:5px;font-size:9px;color:var(--bo);text-shadow:0 0 6px var(--bo)}
.b{font-family:'Press Start 2P',monospace;font-size:11px;padding:10px 15px;cursor:pointer;background:rgba(18,8,34,.9);color:var(--wh);border:2px solid var(--bo);box-shadow:0 0 8px rgba(255,107,157,.25);transition:all .07s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.b:hover{background:#2d0845;color:var(--cy);border-color:var(--cy);box-shadow:0 0 12px rgba(0,229,204,.4)}
.b:active{transform:translate(2px,2px);box-shadow:none}
.b.r{color:var(--re);border-color:var(--re);box-shadow:0 0 8px rgba(255,34,85,.25)}
.b.c{color:var(--cy);border-color:var(--cy);box-shadow:0 0 8px rgba(0,229,204,.25)}
.b.g{color:var(--gold);border-color:var(--gold);box-shadow:0 0 8px rgba(255,158,203,.25)}
.b.n{color:var(--gr);border-color:var(--gr)}
.b.o{color:var(--or);border-color:var(--or);box-shadow:0 0 8px rgba(255,112,67,.25)}
.b.p{color:var(--pk);border-color:var(--pk);box-shadow:0 0 8px rgba(255,61,127,.25)}
.b.t{color:var(--teal);border-color:var(--teal);box-shadow:0 0 8px rgba(0,201,177,.25)}
.b.sm{font-size:9px;padding:7px 11px;border-width:2px}
.b.lg{width:100%;justify-content:center;font-size:11px;padding:12px 16px}
.b:disabled{opacity:.35;cursor:not-allowed}
.bt{height:14px;background:#050012;border:2px solid #3a1040;position:relative;overflow:hidden;box-shadow:inset 0 0 8px rgba(0,0,0,.5)}
.bf{height:100%;transition:width .4s}
.bn{position:absolute;top:0;width:1px;height:100%;background:#3a1040}
.blink{animation:bl .7s step-end infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}
.sl{position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);mix-blend-mode:multiply}
input,select{background:rgba(5,0,18,.9);color:var(--wh);border:2px solid var(--bo);font-family:'Press Start 2P',monospace;font-size:11px;padding:10px 11px;outline:none;width:100%;box-shadow:0 0 6px rgba(255,107,157,.15)}
input:focus,select:focus{border-color:var(--cy);box-shadow:0 0 10px rgba(0,229,204,.3)}
select option{background:#1a0d2e}
.ovl{position:fixed;inset:0;background:rgba(5,2,15,.97);z-index:200;overflow-y:auto;display:flex;align-items:flex-start;justify-content:center;padding:30px 20px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bi)}
</style>
</head>
<body>
<div class="sl"></div>
<div id="app"></div>
<script>
const LAT=45.71546,LON=3.18695,SC='https://api.sencrop.com/v1',AID='7ef37e80-4d08-11f1-a45f-53974d479410',ASC='64dvIWmgUFf9XbrglDh0kb0mvB5VxrQG',DEV='122872',MAXMM=8;
const RT={ca:4800/376,cg:171/15.2,ja:3500/300};
const EF={chapelle:.8,jardin:1};
const PR={reprise:'REPRISE',exploration:'EXPLOR.',maturite:'MATURE'};
const JN=['LUN','MAR','MER','JEU','VEN','SAM','DIM'];
const fi=d=>{const x=new Date(d);return`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`};
const sh=s=>{if(!s)return'';const p=s.split('-');return`${p[2]}/${p[1]}`};
const dw=s=>(new Date(s).getDay()+6)%7;
const mon=()=>{const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-(d.getDay()+6)%7);return d};
const addD=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r};
const b64=s=>{try{return btoa(unescape(encodeURIComponent(s)))}catch(e){return btoa(s)}};
const mkC=(n,ex={})=>({id:`c${n}`,name:`CHAPELLE ${n}`,type:'chapelle',irrigType:'combined',aspR:.33,gagR:.67,profile:'exploration',thr:{reprise:6,exploration:12,maturite:20},lastIrr:null,splitOf:null,isSplit:false,...ex});
const mkJ=(l,ex={})=>({id:`j${l}`,name:`JARDIN ${l}`,type:'jardin',irrigType:'aspersion',aspR:1,gagR:0,profile:'exploration',thr:{reprise:10,exploration:22,maturite:30},lastIrr:null,splitOf:null,isSplit:false,...ex});
const INIT=[mkC(1),mkC(2),mkC(3),mkC(4),...['A','B','C','D','E','F','G','H','I','J'].map(l=>mkJ(l))];
let S={zones:[...INIT],days:[],tab:'meteo',edit:null,loading:false,sc:'?',upd:null};
const lZ=()=>{try{const r=localStorage.getItem('fdrS');if(r)S.zones=JSON.parse(r)}catch(e){}};
const sZ=()=>{try{localStorage.setItem('fdrS',JSON.stringify(S.zones))}catch(e){}};
const uZ=fn=>{S.zones=fn(S.zones);sZ();R()};
const df=(z,days)=>{const fct=EF[z.type],now=new Date();now.setHours(0,0,0,0);const li=z.lastIrr?new Date(z.lastIrr).setHours(0,0,0,0):0;let d=0;for(const day of days){const ms=new Date(day.date).setHours(0,0,0,0);if(ms>now.getTime())break;if(li&&ms<=li)continue;d=Math.max(0,d+day.etp*fct-day.rain);}return d;};
const alt=(z,wd)=>{const fct=EF[z.type],th=z.thr[z.profile];const li=z.lastIrr?new Date(z.lastIrr).setHours(0,0,0,0):0;let d=0;for(const day of wd){const ms=new Date(day.date).setHours(0,0,0,0);if(li&&ms<=li)continue;d=Math.max(0,d+day.etp*fct-day.rain);if(d>=th)return day.date;}return null;};
const itm=(z,d)=>{if(d<=0)return null;const sess=Math.ceil(d/MAXMM),mm=Math.min(d,MAXMM);let aM=0,gM=0;if(z.type==='chapelle'){const mA=mm*(z.irrigType==='combined'?z.aspR:z.irrigType==='aspersion'?1:0);const mG=mm*(z.irrigType==='combined'?z.gagR:z.irrigType==='gag'?1:0);if(mA>0)aM=Math.round(mA/RT.ca*60);if(mG>0)gM=Math.round(mG/RT.cg*60);}else aM=Math.round(mm/RT.ja*60);return{sess,mm:mm.toFixed(1),aM,gM};};
const wdays=()=>{const L=mon();return S.days.filter(d=>{const dd=new Date(d.date);dd.setHours(0,0,0,0);return dd>=L&&dd<=addD(L,6)})};
const W=(c,s='')=>`<div class="w" style="${s}">${c}<span class="wbl">◆</span><span class="wbr">◆</span></div>`;
const bc=p=>p>=100?'var(--re)':p>=70?'var(--or)':'var(--gr)';
const bg=p=>p>=100?'rgba(255,34,85,.5)':p>=70?'rgba(255,112,67,.5)':'rgba(0,255,204,.5)';

async function fetch_data(){
  S.loading=true;R();
  try{
    const L=mon();
    const res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&daily=et0_fao_evapotranspiration,precipitation_sum&start_date=${fi(addD(L,-14))}&end_date=${fi(addD(L,6))}&timezone=Europe%2FParis`);
    const data=await res.json();
    S.days=data.daily.time.map((date,i)=>({date,etp:data.daily.et0_fao_evapotranspiration[i]||0,rainF:data.daily.precipitation_sum[i]||0,rainM:null,rain:data.daily.precipitation_sum[i]||0}));
    try{
      const tr=await fetch(`${SC}/oauth2/token`,{method:'POST',headers:{'Authorization':'Basic '+b64(`${AID}:${ASC}`),'Content-Type':'application/json'},body:JSON.stringify({grant_type:'client_credentials',scope:'user'})});
      if(tr.ok){const td=await tr.json(),tk=td.access_token;const mr=await fetch(`${SC}/me`,{headers:{Authorization:`Bearer ${tk}`}});const md=await mr.json(),uid=md.userId||md.id;const sr=await fetch(`${SC}/users/${uid}/devices/${DEV}/data/daily?beforeDate=${fi(addD(L,7))}T00:00:00.000Z&days=7&measures=RAIN_FALL`,{headers:{Authorization:`Bearer ${tk}`}});if(sr.ok){const sd=await sr.json();(sd?.measures?.data||[]).forEach((e,i)=>{if(typeof e.RAIN_FALL?.value==='number'){const date=fi(addD(L,i));const idx=S.days.findIndex(d=>d.date===date);if(idx>=0){S.days[idx].rainM=e.RAIN_FALL.value;S.days[idx].rain=e.RAIN_FALL.value;}}});S.sc='OK';}}
    }catch(e){S.sc='--';}
    S.upd=new Date();
  }catch(e){}
  S.loading=false;R();
}
const irr=id=>uZ(z=>z.map(x=>x.id===id?{...x,lastIrr:new Date().toISOString()}:x));
const splt=id=>{const z=S.zones.find(x=>x.id===id);if(!z||z.isSplit)return;uZ(prev=>[...prev.map(x=>x.id===id?{...x,isSplit:true}:x),{...z,id:`${id}_a`,name:`${z.name}-A`,splitOf:id},{...z,id:`${id}_b`,name:`${z.name}-B`,splitOf:id}])};
const unsp=id=>uZ(z=>z.filter(x=>x.splitOf!==id).map(x=>x.id===id?{...x,isSplit:false}:x));
const del=id=>uZ(z=>z.filter(x=>x.id!==id&&x.splitOf!==id));
const addZ=type=>{const n=Date.now();const z=type==='chapelle'?mkC('?',{id:`cx${n}`,name:'CHAPELLE ?'}):mkJ('?',{id:`jx${n}`,name:'JARDIN ?'});S.zones=[...S.zones,z];sZ();S.edit={...z};R()};
const oe=id=>{S.edit={...S.zones.find(z=>z.id===id)};R()};
const ce=()=>{S.edit=null;R()};
const se=()=>{uZ(z=>z.map(x=>x.id===S.edit.id?{...S.edit}:x));S.edit=null;R()};
const ef=(k,v)=>{S.edit={...S.edit,[k]:v};R()};
const et=(k,v)=>{S.edit={...S.edit,thr:{...S.edit.thr,[k]:parseFloat(v)||0}};R()};

function R(){
  const wd=wdays();const today=new Date();today.setHours(0,0,0,0);
  const sunSVG=`<svg style="position:absolute;top:0;left:50%;transform:translateX(-50%);opacity:.15;pointer-events:none" width="300" height="120" viewBox="0 0 300 120"><defs><radialGradient id="sg" cx="50%" cy="100%" r="60%"><stop offset="0%" stop-color="#ff9060"/><stop offset="50%" stop-color="#ff3d7f"/><stop offset="100%" stop-color="transparent"/></radialGradient><clipPath id="sc"><ellipse cx="150" cy="120" rx="140" ry="115"/></clipPath></defs><ellipse cx="150" cy="120" rx="140" ry="115" fill="url(#sg)"/>${[0,12,24,37,52,69,88,110].map((y,i)=>`<line x1="10" y1="${y}" x2="290" y2="${y}" stroke="#ff9ecb" stroke-width="${i<3?2.5:1.5}" opacity="${.9-i*.1}" clip-path="url(#sc)"/>`).join('')}</svg>`;
  const hdr=`<header style="background:linear-gradient(180deg,#3d0a5a 0%,#1a0530 50%,#0d0d1a 100%);border-bottom:3px solid var(--bo);box-shadow:0 4px 20px rgba(255,61,127,.2);padding:16px 28px;position:relative;overflow:hidden">${sunSVG}<div style="display:flex;justify-content:space-between;align-items:center;position:relative"><div><div style="font-size:18px;color:var(--gold);text-shadow:0 0 12px rgba(255,158,203,.8),2px 2px #5a0030;letter-spacing:.05em">✦ FERME DU REBOND ✦</div><div style="font-size:10px;color:var(--bo);margin-top:7px;letter-spacing:.12em;text-shadow:0 0 8px rgba(255,107,157,.5)">— BILAN HYDRIQUE v2.0 —</div></div><div style="display:flex;align-items:center;gap:18px">${S.upd?`<div style="font-size:10px;color:var(--si)">MAJ <span style="color:var(--cy)">${S.upd.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</span>&nbsp;&nbsp;SENCROP <span style="color:${S.sc==='OK'?'var(--gr)':'var(--or)'}">◆ ${S.sc}</span></div>`:''}<button class="b t sm" onclick="fetch_data()" ${S.loading?'disabled':''}>► SYNC</button></div></div></header>`;
  const nav=`<nav style="background:rgba(13,8,26,.95);border-bottom:2px solid var(--bi);display:flex;padding:0 28px">${[['meteo','☁ MÉTÉO'],['serres','✿ SERRES'],['jardins','❧ JARDINS']].map(([t,l])=>`<button onclick="S.tab='${t}';R()" style="font-family:'Press Start 2P',monospace;font-size:10px;padding:14px 24px;background:${S.tab===t?'rgba(255,61,127,.08)':'transparent'};color:${S.tab===t?'var(--cy)':'var(--dm)'};border:none;border-bottom:${S.tab===t?'3px solid var(--cy)':'3px solid transparent'};cursor:pointer;text-shadow:${S.tab===t?'0 0 10px var(--cy)':'none'}">${S.tab===t?'<span class="blink" style="color:var(--pk)">► </span>':''}${l}</button>`).join('')}</nav>`;

  let pg='';
  if(S.tab==='meteo'){
    if(S.loading&&S.days.length===0){pg=`<div style="text-align:center;padding:5rem;font-size:13px;color:var(--cy)" class="blink">► CHARGEMENT ◄</div>`;}
    else{
      const tE=wd.reduce((s,d)=>s+d.etp,0),tR=wd.reduce((s,d)=>s+d.rainF,0),tB=wd.reduce((s,d)=>s+(d.rain-d.etp),0),tM=wd.filter(d=>d.rainM!==null).reduce((s,d)=>s+d.rainM,0);
      pg=`<div style="padding:22px 28px"><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px">${[['ETP TOTAL','var(--or)',tE.toFixed(1)+' mm','rgba(255,112,67,.1)','rgba(255,112,67,.3)'],['PLUIE PRÉV','var(--cy)',tR.toFixed(1)+' mm','rgba(0,229,204,.1)','rgba(0,229,204,.3)'],['PLUIE RÉELLE','var(--teal)',tM.toFixed(1)+' mm','rgba(0,201,177,.1)','rgba(0,201,177,.3)'],['BILAN NET',tB>=0?'var(--gr)':'var(--re)',(tB>=0?'+':'')+tB.toFixed(1)+' mm',tB>=0?'rgba(0,255,204,.1)':'rgba(255,34,85,.1)',tB>=0?'rgba(0,255,204,.3)':'rgba(255,34,85,.3)']].map(([l,c,v,bk,gl])=>`<div class="w" style="background:${bk};border-color:${c};box-shadow:0 0 16px ${gl},inset 0 0 24px rgba(0,0,0,.3)"><div style="font-size:10px;color:var(--dm);margin-bottom:10px;letter-spacing:.06em">${l}</div><div style="font-size:28px;color:${c};text-shadow:0 0 12px ${c}">${v}</div><span class="wbl" style="color:${c}">◆</span><span class="wbr" style="color:${c}">◆</span></div>`).join('')}</div>${W(`<div style="font-size:11px;color:var(--gold);margin-bottom:16px;text-shadow:0 0 8px rgba(255,158,203,.5)">☁ DÉTAIL PAR JOUR</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:10px">${wd.map((day,i)=>{const dd=new Date(day.date);dd.setHours(0,0,0,0);const isT=dd.getTime()===today.getTime(),isP=dd<today;const rain=day.rainM!==null?day.rainM:day.rainF;const bil=rain-day.etp,bc2=bil>=0?'var(--gr)':'var(--re)';return W(`<div style="font-size:11px;color:${isT?'var(--cy)':'var(--si)'};text-align:center;margin-bottom:8px;text-shadow:${isT?'0 0 8px var(--cy)':'none'}">${isT?'<span class="blink" style="color:var(--pk)">►</span> ':''}${JN[i]}</div><div style="font-size:10px;color:var(--dm);text-align:center;margin-bottom:12px">${sh(day.date)}</div><div style="font-size:9px;color:var(--dm);margin-bottom:3px">ETP</div><div style="font-size:18px;color:var(--or);margin-bottom:10px;text-shadow:0 0 6px rgba(255,112,67,.4)">${day.etp.toFixed(1)}</div><div style="font-size:9px;color:var(--dm);margin-bottom:3px">PLUIE</div><div style="font-size:18px;color:${day.rainM!==null?'var(--cy)':'#224455'};margin-bottom:10px">${rain.toFixed(1)}${!day.rainM?'<sup style="font-size:10px;opacity:.5">~</sup>':''}</div><div style="font-size:9px;color:var(--dm);margin-bottom:3px">NET</div><div style="font-size:18px;color:${bc2};text-shadow:0 0 6px ${bc2}">${bil>=0?'+':''}${bil.toFixed(1)}</div>`,`opacity:${isP&&!isT?.6:1};background:${isT?'rgba(0,229,204,.06)':'transparent'};border-color:${isT?'var(--cy)':'var(--bi)'};padding:12px 8px;box-shadow:${isT?'0 0 12px rgba(0,229,204,.15)':'none'}`);}).join('')}</div><div style="font-size:9px;color:var(--dm);margin-top:14px">~ = PRÉVISION &nbsp;|&nbsp; SANS ~ = MESURÉ SENCROP</div>`)}</div>`;
    }
  } else {
    const type=S.tab==='serres'?'chapelle':'jardin';
    const visible=S.zones.filter(z=>z.type===type&&(!z.isSplit||z.splitOf!==null));
    const alerts=visible.filter(z=>!z.isSplit&&alt(z,wd));
    const cols=type==='chapelle'?'repeat(2,minmax(0,440px))':'repeat(3,minmax(0,360px))';
    const cards=visible.map(z=>{
      if(z.isSplit&&!z.splitOf)return'';
      const dv=df(z,S.days),th=z.thr[z.profile],pct=Math.min(100,dv/th*100);
      const ad=alt(z,wd),ii=itm(z,dv);
      const urg=dv>=th?'crit':dv>=th*.7?'warn':'ok';
      const UC={crit:'var(--re)',warn:'var(--or)',ok:'var(--gr)'}[urg];
      const UG={crit:'rgba(255,34,85,.3)',warn:'rgba(255,112,67,.3)',ok:'rgba(0,255,204,.3)'}[urg];
      const il=z.type==='chapelle'?(z.irrigType==='combined'?`ASP${Math.round(z.aspR*100)}%+G${Math.round(z.gagR*100)}%`:z.irrigType.toUpperCase()):'ASPERSEUR';
      const cd=z.id.startsWith('cx')||z.id.startsWith('jx')||z.splitOf;
