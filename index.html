<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#1a0a2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Ferme du Rebond">
<title>Ferme du Rebond</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a0a2e;--win:#0c0820;--bo:#c8b8ff;--bi:#4433aa;--gold:#ffd700;--si:#c0c0ff;--wh:#e8e0ff;--dm:#7060a8;--gr:#00e060;--re:#ff2020;--or:#ff8800;--cy:#00e8ff;--pk:#ff60ff;--st:#ffe060}
body{background:var(--bg);color:var(--wh);font-family:'Press Start 2P',monospace;min-height:100vh}
.w{background:var(--win);border:3px solid var(--bo);outline:2px solid var(--bi);outline-offset:-5px;position:relative;padding:14px}
.w::before{content:'◆';font-size:9px;color:var(--bo);position:absolute;top:-1px;left:5px}
.w::after{content:'◆';font-size:9px;color:var(--bo);position:absolute;top:-1px;right:5px}
.b{font-family:'Press Start 2P',monospace;font-size:10px;padding:9px 13px;cursor:pointer;background:var(--win);color:var(--wh);border:2px solid var(--bo);outline:1px solid var(--bi);outline-offset:-3px;transition:all .06s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.b:hover{background:#180e3c;color:var(--gold)}
.b:active{transform:translate(2px,2px)}
.b.r{color:var(--re);border-color:var(--re)}.b.c{color:var(--cy);border-color:var(--cy)}.b.g{color:var(--gold);border-color:var(--gold)}.b.n{color:var(--gr);border-color:var(--gr)}.b.o{color:var(--or);border-color:var(--or)}.b.p{color:var(--pk);border-color:var(--pk)}
.b.sm{font-size:9px;padding:6px 9px}.b.lg{width:100%;justify-content:center;font-size:11px;padding:11px 15px}
.b:disabled{opacity:.35;cursor:not-allowed}
.bt{height:12px;background:#050015;border:2px solid var(--bi);position:relative;overflow:hidden}
.bf{height:100%;transition:width .4s}
.bn{position:absolute;top:0;width:1px;height:100%;background:var(--bi)}
.blink{animation:bl .7s step-end infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}
@keyframes bop{0%,80%,100%{transform:scaleY(.2)}40%{transform:scaleY(1)}}
.sl{position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.1) 2px,rgba(0,0,0,.1) 4px)}
input,select{background:#05001a;color:var(--wh);border:2px solid var(--bo);font-family:'Press Start 2P',monospace;font-size:11px;padding:9px 10px;outline:none;width:100%}
input:focus,select:focus{border-color:var(--cy)}
select option{background:var(--win)}
.ovl{position:fixed;inset:0;background:rgba(8,3,24,.97);z-index:200;overflow-y:auto;display:flex;align-items:flex-start;justify-content:center;padding:30px 20px}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bi)}
</style>
</head>
<body>
<div class="sl"></div>
<div id="app"></div>
<script>
const LAT=45.71546,LON=3.18695,SC='https://api.sencrop.com/v1',AID='7ef37e80-4d08-11f1-a45f-53974d479410',ASC='64dvIWmgUFf9XbrglDh0kb0mvB5VxrQG',DEV='122872',MAXMM=8;
const RT={ca:4800/376,cg:171/15.2,ja:3500/300};
const EF={chapelle:.8,jardin:1};
const PR={reprise:'REPRISE',exploration:'EXPLOR.',maturite:'MATURE'};
const JN=['LUN','MAR','MER','JEU','VEN','SAM','DIM'];
const fi=d=>{const x=new Date(d);return`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`};
const sh=s=>{if(!s)return'';const p=s.split('-');return`${p[2]}/${p[1]}`};
const dw=s=>(new Date(s).getDay()+6)%7;
const mon=()=>{const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-(d.getDay()+6)%7);return d};
const addD=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r};
const b64=s=>{try{return btoa(unescape(encodeURIComponent(s)))}catch(e){return btoa(s)}};
const mkC=(n,ex={})=>({id:`c${n}`,name:`CHAPELLE ${n}`,type:'chapelle',irrigType:'combined',aspR:.33,gagR:.67,profile:'exploration',thr:{reprise:6,exploration:12,maturite:20},lastIrr:null,splitOf:null,isSplit:false,...ex});
const mkJ=(l,ex={})=>({id:`j${l}`,name:`JARDIN ${l}`,type:'jardin',irrigType:'aspersion',aspR:1,gagR:0,profile:'exploration',thr:{reprise:10,exploration:22,maturite:30},lastIrr:null,splitOf:null,isSplit:false,...ex});
const INIT=[mkC(1),mkC(2),mkC(3),mkC(4),...['A','B','C','D','E','F','G','H','I','J'].map(l=>mkJ(l))];
let S={zones:[...INIT],days:[],tab:'meteo',edit:null,loading:false,sc:'?',upd:null};
const lZ=()=>{try{const r=localStorage.getItem('fdr9');if(r)S.zones=JSON.parse(r)}catch(e){}};
const sZ=()=>{try{localStorage.setItem('fdr9',JSON.stringify(S.zones))}catch(e){}};
const uZ=fn=>{S.zones=fn(S.zones);sZ();R()};
const df=(z,days)=>{const fct=EF[z.type],now=new Date();now.setHours(0,0,0,0);const li=z.lastIrr?new Date(z.lastIrr).setHours(0,0,0,0):0;let d=0;for(const day of days){const ms=new Date(day.date).setHours(0,0,0,0);if(ms>now.getTime())break;if(li&&ms<=li)continue;d=Math.max(0,d+day.etp*fct-day.rain);}return d;};
const alt=(z,wd)=>{const fct=EF[z.type],th=z.thr[z.profile];const li=z.lastIrr?new Date(z.lastIrr).setHours(0,0,0,0):0;let d=0;for(const day of wd){const ms=new Date(day.date).setHours(0,0,0,0);if(li&&ms<=li)continue;d=Math.max(0,d+day.etp*fct-day.rain);if(d>=th)return day.date;}return null;};
const itm=(z,d)=>{if(d<=0)return null;const sess=Math.ceil(d/MAXMM),mm=Math.min(d,MAXMM);let aM=0,gM=0;if(z.type==='chapelle'){const mA=mm*(z.irrigType==='combined'?z.aspR:z.irrigType==='aspersion'?1:0);const mG=mm*(z.irrigType==='combined'?z.gagR:z.irrigType==='gag'?1:0);if(mA>0)aM=Math.round(mA/RT.ca*60);if(mG>0)gM=Math.round(mG/RT.cg*60);}else aM=Math.round(mm/RT.ja*60);return{sess,mm:mm.toFixed(1),aM,gM};};
const wdays=()=>{const L=mon();return S.days.filter(d=>{const dd=new Date(d.date);dd.setHours(0,0,0,0);return dd>=L&&dd<=addD(L,6)})};
const W=(c,s='')=>`<div class="w" style="${s}">${c}<span style="position:absolute;bottom:-1px;left:5px;font-size:9px;color:var(--bo)">◆</span><span style="position:absolute;bottom:-1px;right:5px;font-size:9px;color:var(--bo)">◆</span></div>`;
const bc=p=>p>=100?'var(--re)':p>=70?'var(--or)':'var(--gr)';

async function fetch_data(){
  S.loading=true;R();
  try{
    const L=mon();
    const res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&daily=et0_fao_evapotranspiration,precipitation_sum&start_date=${fi(addD(L,-14))}&end_date=${fi(addD(L,6))}&timezone=Europe%2FParis`);
    const data=await res.json();
    S.days=data.daily.time.map((date,i)=>({date,etp:data.daily.et0_fao_evapotranspiration[i]||0,rainF:data.daily.precipitation_sum[i]||0,rainM:null,rain:data.daily.precipitation_sum[i]||0}));
    try{
      const tr=await fetch(`${SC}/oauth2/token`,{method:'POST',headers:{'Authorization':'Basic '+b64(`${AID}:${ASC}`),'Content-Type':'application/json'},body:JSON.stringify({grant_type:'client_credentials',scope:'user'})});
      if(tr.ok){const td=await tr.json(),tk=td.access_token;const mr=await fetch(`${SC}/me`,{headers:{Authorization:`Bearer ${tk}`}});const md=await mr.json(),uid=md.userId||md.id;const sr=await fetch(`${SC}/users/${uid}/devices/${DEV}/data/daily?beforeDate=${fi(addD(L,7))}T00:00:00.000Z&days=7&measures=RAIN_FALL`,{headers:{Authorization:`Bearer ${tk}`}});if(sr.ok){const sd=await sr.json();(sd?.measures?.data||[]).forEach((e,i)=>{if(typeof e.RAIN_FALL?.value==='number'){const date=fi(addD(L,i));const idx=S.days.findIndex(d=>d.date===date);if(idx>=0){S.days[idx].rainM=e.RAIN_FALL.value;S.days[idx].rain=e.RAIN_FALL.value;}}});S.sc='OK';}}
    }catch(e){S.sc='--';}
    S.upd=new Date();
  }catch(e){}
  S.loading=false;R();
}

const irr=id=>uZ(z=>z.map(x=>x.id===id?{...x,lastIrr:new Date().toISOString()}:x));
const splt=id=>{const z=S.zones.find(x=>x.id===id);if(!z||z.isSplit)return;uZ(prev=>[...prev.map(x=>x.id===id?{...x,isSplit:true}:x),{...z,id:`${id}_a`,name:`${z.name}-A`,splitOf:id},{...z,id:`${id}_b`,name:`${z.name}-B`,splitOf:id}])};
const unsp=id=>uZ(z=>z.filter(x=>x.splitOf!==id).map(x=>x.id===id?{...x,isSplit:false}:x));
const del=id=>uZ(z=>z.filter(x=>x.id!==id&&x.splitOf!==id));
const addZ=type=>{const n=Date.now();const z=type==='chapelle'?mkC('?',{id:`cx${n}`,name:'CHAPELLE ?'}):mkJ('?',{id:`jx${n}`,name:'JARDIN ?'});S.zones=[...S.zones,z];sZ();S.edit={...z};R()};
const oe=id=>{S.edit={...S.zones.find(z=>z.id===id)};R()};
const ce=()=>{S.edit=null;R()};
const se=()=>{uZ(z=>z.map(x=>x.id===S.edit.id?{...S.edit}:x));S.edit=null;R()};
const ef=(k,v)=>{S.edit={...S.edit,[k]:v};R()};
const et=(k,v)=>{S.edit={...S.edit,thr:{...S.edit.thr,[k]:parseFloat(v)||0}};R()};

function R(){
  const wd=wdays();
  const today=new Date();today.setHours(0,0,0,0);

  const hdr=`<header style="background:linear-gradient(180deg,#28106a 0%,#1a0a2e 100%);border-bottom:4px solid var(--bo);outline:2px solid var(--bi);outline-offset:-6px;padding:14px 24px"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:16px;color:var(--gold);letter-spacing:.04em">✦ FERME DU REBOND ✦</div><div style="font-size:9px;color:var(--dm);margin-top:6px;letter-spacing:.1em">— BILAN HYDRIQUE v2.0 —</div></div><div style="display:flex;align-items:center;gap:16px">${S.upd?`<div style="font-size:9px"><span style="color:var(--si)">MAJ ${S.upd.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</span>&nbsp;&nbsp;SENCROP <span style="color:${S.sc==='OK'?'var(--gr)':'var(--or)'}">${S.sc==='OK'?'◆OK':'◆--'}</span></div>`:''}<button class="b c sm" onclick="fetch_data()" ${S.loading?'disabled':''}>► SYNC</button></div></div></header>`;

  const nav=`<nav style="background:#08001e;border-bottom:3px solid var(--bo);display:flex;padding:0 24px">${[['meteo','☁ MÉTÉO'],['serres','✿ SERRES'],['jardins','❧ JARDINS']].map(([t,l])=>`<button onclick="S.tab='${t}';R()" style="font-family:'Press Start 2P',monospace;font-size:10px;padding:13px 22px;background:${S.tab===t?'#180e40':'transparent'};color:${S.tab===t?'var(--gold)':'var(--dm)'};border:none;border-bottom:${S.tab===t?'3px solid var(--gold)':'3px solid transparent'};border-right:1px solid var(--bi);cursor:pointer">${S.tab===t?'<span class="blink">►</span> ':''}${l}</button>`).join('')}</nav>`;

  let pg='';
  if(S.tab==='meteo'){
    if(S.loading&&S.days.length===0){pg=`<div style="text-align:center;padding:4rem;font-size:12px;color:var(--cy)" class="blink">► CHARGEMENT DES DONNÉES ◄</div>`;}
    else{
      const tE=wd.reduce((s,d)=>s+d.etp,0),tR=wd.reduce((s,d)=>s+d.rainF,0),tB=wd.reduce((s,d)=>s+(d.rain-d.etp),0),tM=wd.filter(d=>d.rainM!==null).reduce((s,d)=>s+d.rainM,0);
      pg=`<div style="padding:20px 24px"><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px">${[['ETP TOTAL','var(--or)',tE.toFixed(1)+' mm'],['PLUIE PRÉV','var(--cy)',tR.toFixed(1)+' mm'],['PLUIE RÉELLE','#44ddff',tM.toFixed(1)+' mm'],['BILAN NET',tB>=0?'var(--gr)':'var(--re)',(tB>=0?'+':'')+tB.toFixed(1)+' mm']].map(([l,c,v])=>W(`<div style="font-size:9px;color:var(--dm);margin-bottom:8px">${l}</div><div style="font-size:26px;color:${c}">${v}</div>`)).join('')}</div>${W(`<div style="font-size:10px;color:var(--gold);margin-bottom:14px">☁ DÉTAIL PAR JOUR</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:10px">${wd.map((day,i)=>{const dd=new Date(day.date);dd.setHours(0,0,0,0);const isT=dd.getTime()===today.getTime(),isP=dd<today;const rain=day.rainM!==null?day.rainM:day.rainF;const bil=rain-day.etp;const bc2=bil>=0?'var(--gr)':'var(--re)';return W(`<div style="font-size:10px;color:${isT?'var(--gold)':'var(--si)'};text-align:center;margin-bottom:6px">${isT?'<span class="blink">►</span> ':''}${JN[i]}</div><div style="font-size:9px;color:var(--dm);text-align:center;margin-bottom:10px">${sh(day.date)}</div><div style="font-size:9px;color:var(--dm);margin-bottom:2px">ETP</div><div style="font-size:16px;color:var(--or);margin-bottom:8px">${day.etp.toFixed(1)}</div><div style="font-size:9px;color:var(--dm);margin-bottom:2px">PLUIE</div><div style="font-size:16px;color:${day.rainM!==null?'var(--cy)':'#225566'};margin-bottom:8px">${rain.toFixed(1)}${!day.rainM?'<sup style="font-size:9px">~</sup>':''}</div><div style="font-size:9px;color:var(--dm);margin-bottom:2px">NET</div><div style="font-size:16px;color:${bc2}">${bil>=0?'+':''}${bil.toFixed(1)}</div>`,`opacity:${isP&&!isT?.65:1};background:${isT?'#1a0c40':'var(--win)'};padding:10px 6px`);}).join('')}</div><div style="font-size:9px;color:var(--dm);margin-top:12px">~ = PRÉVISION &nbsp;|&nbsp; SANS ~ = MESURÉ SENCROP</div>`)}</div>`;
    }
  } else {
    const type=S.tab==='serres'?'chapelle':'jardin';
    const visible=S.zones.filter(z=>z.type===type&&(!z.isSplit||z.splitOf!==null));
    const alerts=visible.filter(z=>!z.isSplit&&alt(z,wd));
    const cols=type==='chapelle'?'repeat(2,1fr)':'repeat(3,1fr)';
    const cards=visible.map(z=>{
      if(z.isSplit&&!z.splitOf)return'';
      const dv=df(z,S.days),th=z.thr[z.profile],pct=Math.min(100,dv/th*100);
      const ad=alt(z,wd),ii=itm(z,dv);
      const urg=dv>=th?'crit':dv>=th*.7?'warn':'ok';
      const UC={crit:'var(--re)',warn:'var(--or)',ok:'var(--gr)'}[urg];
      const il=z.type==='chapelle'?(z.irrigType==='combined'?`ASP${Math.round(z.aspR*100)}%+G${Math.round(z.gagR*100)}%`:z.irrigType.toUpperCase()):'ASPERSEUR';
      const cd=z.id.startsWith('cx')||z.id.startsWith('jx')||z.splitOf;
      return W(`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-size:12px;color:${UC}">${z.splitOf?'<span style="color:var(--dm)">½ </span>':''}${z.name}</div><button class="b sm c" onclick="oe('${z.id}')">✎ EDIT</button></div><div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:6px"><span style="color:var(--dm)">DEF <span style="color:${UC};font-size:15px">${dv.toFixed(1)}mm</span></span><span style="color:var(--dm)">MAX <span style="color:var(--gold);font-size:15px">${th}mm</span></span></div><div class="bt" style="margin-bottom:12px"><div class="bf" style="width:${pct}%;background:${bc(pct)}"></div>${[25,50,75].map(p=>`<div class="bn" style="left:${p}%"></div>`).join('')}</div><div style="font-size:9px;color:var(--dm);margin-bottom:10px;display:flex;gap:12px;flex-wrap:wrap;line-height:2"><span>PROFIL <span style="color:var(--gold)">${PR[z.profile]}</span></span>${z.lastIrr?`<span>IRR <span style="color:var(--gr)">${sh(z.lastIrr.split('T')[0])}</span></span>`:''}<span style="color:var(--pk)">${il}</span></div>${urg==='crit'?`<div style="border:2px solid var(--re);padding:8px;margin-bottom:10px;font-size:10px;color:var(--re);text-align:center" class="blink">► IRRIGUER MAINTENANT ◄</div>`:ad?`<div style="border:2px solid var(--or);padding:8px;margin-bottom:10px;font-size:10px;color:var(--or)">✦ IRRIGUER ${JN[dw(ad)]} ${sh(ad)}</div>`:`<div style="border:1px solid var(--bi);padding:8px;margin-bottom:10px;font-size:10px;color:var(--dm)">✓ OK CETTE SEMAINE</div>`}${ii?`<div style="border:1px solid var(--bi);padding:8px;margin-bottom:10px;font-size:9px;line-height:2">${ii.sess>1?`<span style="color:var(--gold)">${ii.sess}× ${ii.mm}mm/s. </span>`:''}${ii.aM>0?`<span style="color:var(--cy)">ASP ${ii.aM}min </span>`:''}${ii.gM>0?`<span style="color:var(--pk)">GÀG ${ii.gM}min</span>`:''}</div>`:''}<div style="display:flex;gap:7px;flex-wrap:wrap"><button class="b ${urg==='crit'?'r':'o'}" onclick="irr('${z.id}')">💧 IRRIGUÉ</button>${z.type==='chapelle'&&!z.splitOf&&!z.isSplit?`<button class="b c sm" onclick="splt('${z.id}')">⚡ SCINDER</button>`:''}${z.splitOf?`<button class="b g sm" onclick="unsp('${z.splitOf}')">↩ FUSIONNER</button>`:''}${cd?`<button class="b r sm" onclick="del('${z.id}')">✕</button>`:''}</div>`,`border-color:${urg==='crit'?'var(--re)':urg==='warn'?'var(--or)':'var(--bo)'}`);
    }).join('');
    pg=`<div style="padding:20px 24px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">${W(`<span style="color:var(--gold)">${type==='chapelle'?'✿ SERRES':'❧ JARDINS'}</span>`,`padding:8px 14px`)}<div style="display:flex;gap:10px;align-items:center">${alerts.length>0?`<div style="font-size:10px;color:var(--re)" class="blink">⚠ ${alerts.length} ALERTE${alerts.length>1?'S':''}</div>`:''}<button class="b c sm" onclick="addZ('${type}')">+ AJOUTER</button></div></div><div style="display:grid;grid-template-columns:${cols};gap:14px">${cards}</div></div>`;
  }

  const modal=S.edit?`<div class="ovl" onclick="if(event.target===this)ce()">${W(`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div style="font-size:12px;color:var(--gold)">✎ CONFIGURER</div><button class="b r sm" onclick="ce()">✕ FERMER</button></div><div style="display:flex;flex-direction:column;gap:13px"><div><div style="font-size:9px;color:var(--gold);margin-bottom:6px">◆ RENOMMER</div><input value="${S.edit.name}" oninput="ef('name',this.value)"></div><div><div style="font-size:9px;color:var(--gold);margin-bottom:6px">◆ PROFIL</div><select onchange="ef('profile',this.value)"><option value="reprise" ${S.edit.profile==='reprise'?'selected':''}>REPRISE/SEMIS</option><option value="exploration" ${S.edit.profile==='exploration'?'selected':''}>EXPLORATION</option><option value="maturite" ${S.edit.profile==='maturite'?'selected':''}>MATURITÉ</option></select></div>${W(`<div style="font-size:9px;color:var(--gold);margin-bottom:9px">◆ SEUILS (mm)</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px">${['reprise','exploration','maturite'].map(p=>`<div><div style="font-size:8px;color:var(--dm);margin-bottom:4px">${PR[p]}</div><input type="number" min="1" max="100" value="${S.edit.thr[p]}" style="text-align:center" oninput="et('${p}',this.value)"></div>`).join('')}</div>`)}${S.edit.type==='chapelle'?`<div><div style="font-size:9px;color:var(--gold);margin-bottom:6px">◆ IRRIGATION</div><select onchange="ef('irrigType',this.value)"><option value="aspersion" ${S.edit.irrigType==='aspersion'?'selected':''}>ASPERSION</option><option value="gag" ${S.edit.irrigType==='gag'?'selected':''}>GÀG</option><option value="combined" ${S.edit.irrigType==='combined'?'selected':''}>ASP + GÀG</option></select></div>${S.edit.irrigType==='combined'?W(`<div style="font-size:9px;color:var(--gold);margin-bottom:9px">◆ RATIO (%)</div><div style="display:grid;grid-template-columns:1fr 16px 1fr;gap:8px;align-items:center"><div><div s
